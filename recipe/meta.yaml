{% set name = "pheasant" %}
{% set version = "2.5.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9aaf714a46f88ae0be790161b2929d25d49def0129d2f0bb2994c07eb02ba108

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - pheasant = pheasant.main:cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - click
    - ipykernel
    - markdown
    - jinja2
    - termcolor
    - colorama
    - pyyaml

test:
  requires:
    - python {{ python_min }}
  imports:
    - pheasant
  commands:
    - pheasant list

about:
  home: https://github.com/daizutabi/pheasant
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Documentation tool for Markdown conversion by Jupyter client
  doc_url: https://pheasant.daizutabi.net/
  dev_url: https://github.com/daizutabi/pheasant

extra:
  recipe-maintainers:
    - daizutabi
    - pkestene
